version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: comunidad-backend
    restart: always
    ports:
      - "3001:3001"
    env_file:
      - ./backend/.env.production
    environment:
      - NODE_ENV=production
    networks:
      - comunidad-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        - REACT_APP_API_URL=https://comuva.com
    container_name: comunidad-frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - comunidad-network

  nginx:
    image: nginx:latest
    container_name: nginx-proxy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - frontend
      - backend
    networks:
      - comunidad-network
  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
networks:
  comunidad-network:
    driver: bridge
